name: test

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6
        with:
          persist-credentials: false

      - name: bootstrap
        run: script/bootstrap

      - name: test
        run: script/test

      - name: upload coverage result
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # pin@v7.0.1
        with:
          name: OneShot-coverage-${{ github.run_id }}
          path: build/TestResults.xcresult
          retention-days: 5
          if-no-files-found: warn
